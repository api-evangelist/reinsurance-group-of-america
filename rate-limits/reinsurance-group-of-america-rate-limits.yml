description: RGA publishes no public API rate-limit documentation. Cedant portals (RGA Central, ASAP,
  Gateway, FAC Exchange) operate behind authenticated client portals with limits set by the platform
  operator and the underlying treaty.
sources:
  - https://www.rgare.com/
notes: No public API or rate-limit documentation; throttling is internal to the cedant portal.
limits:
  - name: Cedant-portal throttling
    scope: contract
    metric: varies
    limit: 'see RGA cedant agreement / portal terms'
policies:
  - name: Portal-Bound Limits
    description: Any throughput caps on RGA Central / ASAP / Gateway / FAC Exchange are enforced by the
      portal and bound to the cedant's authenticated session.
