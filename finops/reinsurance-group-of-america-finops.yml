meters:
  - name: treaty_term
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility comes from treaty statements and cedant-portal reports; no programmatic API
      usage feed.
  - name: Allocation
    description: Allocate to the ceding insurer / product line covered by the treaty; portal access
      is not separately metered.
  - name: Optimization
    description: Optimization is treaty-level — adjust retention, scope, and structure at renewal rather
      than tuning request volume.
  - name: Accountability
    description: Owner is the cedant's reinsurance / treaty-management function.
notes: Treaty- and contract-driven; no metered API surface. Generic FOCUS per-call meters removed.
